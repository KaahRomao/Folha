<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Hidráulica Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex h-screen w-screen flex-col">

  <!-- Header -->
  <header class="w-full">
    <div class="flex h-14 w-full items-center justify-between bg-blue-700 px-4">
      <h2 class="text-xl font-bold text-white">Sistema Hidráulica Pro</h2>
      <a href="./login.html">
        <span
          class="flex cursor-pointer items-center justify-center rounded bg-orange-500 px-2 py-1 text-sm font-bold text-white transition-colors hover:bg-orange-600">
          Sair
        </span>
      </a>
    </div>
  </header>

  <hr class="border border-blue-600" />

  <div class="flex flex-1 flex-row h-full overflow-hidden">

    <!-- Sidebar -->
    <nav class="flex h-full w-64 flex-col items-center p-1 shadow-lg">
      <button onclick="mostrarConsulta()"
        class="mt-5 flex h-9 w-[90%] items-center justify-center border-2 border-blue-400 bg-blue-700 text-white hover:scale-105 hover:cursor-pointer transition-transform rounded">
        Consultar Produtos
      </button>
    </nav>

    <!-- Main content -->
    <main class="flex h-full w-full flex-1 items-center justify-center overflow-y-auto">

      <!-- Tela inicial (boas-vindas) -->
      <div id="tela-boas-vindas" class="flex h-36 w-96 flex-col items-center justify-center gap-2.5 shadow">
        <h2 class="text-3xl font-bold text-blue-600">Bem-vindo</h2>
        <p class="text-gray-500">Selecione uma opção no menu lateral</p>
      </div>

      <!-- Tela de consulta -->
      <div id="tela-consulta" class="hidden w-full flex-1 flex flex-col items-center py-10 gap-8">
        <div
          class="flex w-full max-w-lg flex-col items-center gap-4 border-2 border-blue-400 rounded-2xl p-8 shadow-md">
          <h2 class="text-3xl font-bold text-blue-600">Consultor de Bombas</h2>
          <input type="text" placeholder="Coloque o ID da bomba"
            class="h-12 w-full text-center text-lg border border-gray-300 rounded-lg shadow focus:outline-none focus:ring-2 focus:ring-blue-400"
            id="maquinarioSelect" />
          <button onclick="buscarMaquinario()"
            class="h-12 w-full bg-green-600 text-white text-lg rounded-lg hover:bg-green-700 transition">
            Consultar
          </button>
          <div id="resultado" class="hidden">
            <article class="flex w-96 flex-col overflow-hidden rounded-2xl shadow-2xl">
              <img id="imgEl" src="" alt="" class="h-60 w-full object-cover" />
              <div class="flex flex-col items-center gap-2 p-6">
                <span id="nome" class="text-2xl font-bold text-blue-800 text-center"></span>
                <span id="descricao" class="text-center text-base text-gray-600"></span>
                <span id="valor" class="text-3xl font-bold text-green-600 mt-2"></span>
              </div>
            </article>
          </div>

          <p id="nao-encontrado" class="hidden text-red-500 text-lg font-semibold">Produto não encontrado.</p>
        </div>

      </div>


    </main>
  </div>

  <script src="./script.js" defer></script>
</body>

</html>
