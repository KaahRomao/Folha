<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/output.css" />

    <title>Produtos - Hidráulica Pro</title>
  </head>
  <body class="flex min-h-screen w-screen flex-col">
    <header class="w-full">
      <div
        class="flex h-14 w-full items-center justify-between bg-blue-700 px-4"
      >
        <div
          class="flex h-14 w-auto items-center justify-center text-xl font-bold text-white"
        >
          <h2>Sistema Hidráulica Pro</h2>
        </div>
        <div class="flex h-7.5 w-25 items-center justify-center">
          <a href="./login.html">
            <span
              class="flex w-17.5 cursor-pointer items-center justify-center rounded bg-orange-500 px-2 py-1 text-sm font-bold text-white transition-colors hover:bg-orange-600"
              >Sair</span
            >
          </a>
        </div>
      </div>
    </header>
    <hr class="border border-blue-600" />
    <div class="flex flex-1 flex-row">
      <nav class="mt-3 flex h-full w-62.5 flex-col items-center p-1 shadow-lg">
        <article
          class="mt-5 flex h-7 w-[90%] items-center justify-center bg-blue-700 hover:scale-105 hover:cursor-pointer"
        >
          <button
            class="flex items-center justify-center text-white hover:scale-105 hover:cursor-pointer"
          >
            Consultar Produtos
          </button>
        </article>
      </nav>
      <main class="mt-10 flex w-full flex-1 justify-center">
        <div
          class="flex h-fit w-200 flex-col items-center gap-2.5 rounded-xl pt-10 shadow-xl"
        >
          <h2 class="text-2xl font-bold text-blue-600">Consultor de Bombas</h2>
          <input
            type="text"
            placeholder="Coloque o ID da bomba"
            class="h-10 w-[80%] text-center shadow hover:cursor-text"
            id="maquinarioSelect"
          />
          <button
            onclick="buscarMaquinario()"
            class="h-10 w-[80%] bg-green-600 text-center text-white"
          >
            Consultar
          </button>
          <div class="flex w-full flex-col items-center gap-2.5" id="resultado">
            <span id="img"><img src="" alt="" /></span>
            <p><span id="nome" class="text-2xl text-blue-800"></span></p>
            <p><span id="descricao" class="text-xl"></span></p>
            <p><span id="valor" class="text-3xl text-green-600"></span></p>
          </div>
        </div>
      </main>
    </div>
    <script src="./script.js" defer></script>
  </body>
</html>
